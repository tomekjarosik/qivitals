syntax = "proto3";

package qivitals.v1;

option go_package = "github.com/tomekjarosik/qivitals/api/qivitals/v1";

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";

// ObjectMeta contains the identity and grouping information for a sensor.
message ObjectMeta {
  string id = 1;
  string namespace = 2;
  string name = 3;
  string description = 4;
  map<string, string> labels = 5;
  string resource_version = 6;
}

// ConditionRule defines a rule that evaluates against sensor data
// and can override the sensor's computed state.
message ConditionRule {
  // Unique name for this rule (e.g., "BatteryLow", "HighLatency")
  string name = 1;

  // CEL expression to evaluate.
  // Example: `double(reported_data['battery_level']) < 15.0`
  //          `labels['environment'] == 'prod' && int(reported_data['cpu_percent']) > 90`
  string expression = 2;

  // The state to apply if this expression evaluates to true.
  // Examples: "PAUSED", "FAILED", "OK" etc.
  string target_state = 3;

  // Human-readable message template (optional).
  // Supports Go templating with access to reported_data.
  // Example: "Battery at {{ .reported_data.battery_level }}%"
  string message_template = 4;
}

// Condition represents a single evaluation result from a ConditionRule.
// Follows the Kubernetes Condition pattern.
message Condition {
  // Unique identifier matching a ConditionRule.name
  string type = 1;

  // Evaluation result: "True", "False", "Unknown"
  string status = 2;

  // Machine-readable reason (e.g., "ThresholdExceeded", "RuleNotMatched")
  string reason = 3;

  // Human-readable description (e.g., "Battery reported at 12%")
  string message = 4;

  // Unix timestamp when this condition last changed state
  int64 last_transition_time = 5;
}

// SensorSpec contains ONLY the desired configuration.
message SensorSpec {
  int64 graceful_period_seconds = 1;
  int64 failure_period_seconds = 2;

  // The rules evaluated every time ReportSensor is called
  repeated ConditionRule rules = 3;
}

// SensorState represents the high-level computed health of a sensor.
enum SensorState {
  // 0 is the default value in proto3. Perfect for when a sensor is registered
  // but hasn't reported any data yet.
  UNKNOWN = 0;

  // The sensor is healthy and reporting within normal parameters.
  OK = 1;

  // The sensor is taking longer than the graceful period or a non-critical rule matched.
  DEGRADED = 2;

  // The sensor has explicitly failed, or has exceeded the failure period timeout.
  FAILED = 3;

  // The sensor monitoring is intentionally suspended by the user.
  PAUSED = 4;
}

// SensorStatus contains ONLY the observed runtime state.
message SensorStatus {
  SensorState state = 1;             // Computed state
  int64 last_reported_timestamp = 2;    // Unix timestamp of last heartbeat/data report
  // Detailed breakdown of the sensor's health evaluations
  repeated Condition conditions = 3;

  map<string, string> reported_data = 5; // Generic telemetry
  int64 last_spec_updated_timestamp = 6; // Unix timestamp of last configuration change
}

// Sensor is the top-level entity representing the entire resource.
message Sensor {
  ObjectMeta metadata = 1;
  SensorSpec spec = 2;
  SensorStatus status = 3;
}

// --- RPC Requests & Responses ---

message RegisterSensorRequest {
  Sensor sensor = 1;
}

message RegisterSensorResponse {
  Sensor sensor = 1; // Returns the fully initialized sensor (with ID and timestamps)
}

message PatchOperation {
  string op = 1;    // "add", "remove", "replace", "move", "copy", "test"
  string path = 2;  // JSON Pointer, e.g. "/metadata/name"
  string value = 3; // JSON-encoded value (or use google.protobuf.Value)
}

message PatchSensorRequest {
  string id = 1;
  string version = 2;
  repeated PatchOperation operations = 3;
}

message PatchSensorResponse {
  Sensor sensor = 1;
}

message ReportSensorRequest {
  // Allow reporting by UUID OR by Natural Key (Namespace + Name)
  string id = 1;
  string namespace = 2;
  string name = 3;

  string message = 4; // E.g., "Database backup completed successfully in 14s"
  map<string, string> data = 5;

  // For bots: a signature.
  // For humans: a Bearer token (the magic link token).
  bytes proof = 6;
}

message ReportSensorResponse {
  Sensor sensor = 1; // Returns the newly calculated state immediately!
}

message DeleteSensorRequest {
  string id = 1;
}

// An empty response indicates success. If it fails, a gRPC error is returned.
message DeleteSensorResponse {}

message QuerySensorsRequest {
  string id = 1;
  string namespace = 2;
  string name = 3;
  string search = 4; // searches inside name or description

  map<string, string> labels = 5;
  repeated string has_label_keys = 6;
  repeated SensorState states = 7;

  int32 page_size = 8;
  string page_token = 9;
  string order_by = 10;
  bool order_desc = 11;
}

message QuerySensorsResponse {
  repeated Sensor sensors = 1;
  string next_page_token = 2;
}

// --- Service Definition ---

service QiVitalsService {

  rpc RegisterSensor(RegisterSensorRequest) returns (RegisterSensorResponse) {
    option (google.api.http) = {
      post: "/api/v1/sensors"
      body: "*"
    };
  }

  rpc PatchSensor(PatchSensorRequest) returns (PatchSensorResponse) {
    option (google.api.http) = {
      patch: "/api/v1/sensors/{id}"
      body: "operations"   // body contains just the array of operations
    };
  }

  rpc QuerySensors(QuerySensorsRequest) returns (QuerySensorsResponse) {
    option (google.api.http) = {
      get: "/api/v1/sensors"
    };
  }

  rpc ReportSensor(ReportSensorRequest) returns (ReportSensorResponse) {
    option (google.api.http) = {
      post: "/api/v1/sensor/data"
      body: "*"
    };
  }

  rpc DeleteSensor(DeleteSensorRequest) returns (DeleteSensorResponse) {
    option (google.api.http) = {
      delete: "/api/v1/sensors/{id}"
    };
  }
}