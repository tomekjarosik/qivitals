syntax = "proto3";

package statussvc.v1;

option go_package = "github.com/tomekjarosik/one-status/api/statussvc/v1";

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";

message Label {
  string key = 1;
  string value = 2;
}

// SensorSpec represents the configuration and metadata of a sensor
message SensorSpec {
  string id = 1;
  string namespace = 2;
  string name = 3;
  string description = 4;
  int64 graceful_period_seconds = 5;
  int64 failure_period_seconds = 6;
  repeated Label labels = 7;
}

// SensorStatus represents the observed runtime state of the sensor
message SensorStatus {
  // The computed state of the sensor (e.g., "ACTIVE", "DEGRADED", "DEAD")
  string state = 1;

  int64 last_ok_timestamp = 2;
  int64 last_updated_timestamp = 3;

  // The most recent generic telemetry/data reported by the sensor.
  // Example: {"disk_usage": "80", "cpu_temp": "65"}
  map<string, string> reported_data = 4;
}

// Sensor represents the complete object, combining its Spec and current runtime Status
message Sensor {
  string id = 1;
  SensorSpec spec = 2;
  SensorStatus status = 3;
}

message RegisterSensorRequest {
  SensorSpec spec = 1;
}

message RegisterSensorResponse {
  string id = 1;
  bool success = 2;
  int64 timestamp = 3;
}

message UpdateSensorRequest {
  SensorSpec spec = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message UpdateSensorResponse {
  SensorSpec spec = 1;
  bool success = 2;
}

message ReportSensorRequest {
  string id = 1;
  map<string, string> data = 2;
}

message ReportSensorResponse {
  string id = 1;
  bool success = 2;
  int64 timestamp = 3;
}

message DeleteSensorRequest {
  string id = 1;
}

message DeleteSensorResponse {
  bool success = 1;
}

message QuerySensorsRequest {
  string id = 1;
  string name = 2;
  string namespace = 3;

  repeated Label labels = 4;
  string status = 5;

  int32 page_size = 6;
  string page_token = 7;
}

message QuerySensorsResponse {
  repeated Sensor sensors = 1;
  string next_page_token = 2;
}

service StatusService {

  rpc RegisterSensor(RegisterSensorRequest) returns (RegisterSensorResponse) {
    option (google.api.http) = {
      post: "/api/v1/sensors"
      body: "*"
    };
  }

  rpc UpdateSensor(UpdateSensorRequest) returns (UpdateSensorResponse) {
    option (google.api.http) = {
      patch: "/api/v1/sensors/{spec.id}"
      body: "*"
    };
  }

  rpc QuerySensors(QuerySensorsRequest) returns (QuerySensorsResponse) {
    option (google.api.http) = {
      get: "/api/v1/sensors"
    };
  }

  rpc ReportSensor(ReportSensorRequest) returns (ReportSensorResponse) {
    option (google.api.http) = {
      post: "/api/v1/sensor/data"
      body: "*"
    };
  }

  rpc DeleteSensor(DeleteSensorRequest) returns (DeleteSensorResponse) {
    option (google.api.http) = {
      delete: "/api/v1/sensors/{id}"
    };
  }
}