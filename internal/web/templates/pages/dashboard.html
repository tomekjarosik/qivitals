{{define "dashboard-page"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qi Vitals · Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.target.id === 'sensor-grid-container') {
                if (!document.startViewTransition) return;
                evt.preventDefault();
                const target = evt.detail.target;
                document.startViewTransition(async () => {
                    const response = await fetch(target.getAttribute('hx-get'));
                    const newHTML = await response.text();
                    target.innerHTML = newHTML;
                    formatTimestamps();
                });
            }
        });
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'sensor-grid-container') formatTimestamps();
        });
        function formatTimestamps() {
            document.querySelectorAll('.format-timestamp').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'), 10);
                if (ts > 0) {
                    const date = new Date(ts * 1000);
                    el.textContent = date.toLocaleString(undefined, {
                        month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                }
            });
        }
    </script>
    <style>
        .tooltip-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .tooltip-trigger:hover .tooltip-content {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/50 min-h-screen font-sans antialiased text-slate-800"
      x-data="{
          filtersOpen: {{ if .Filter.ShowLabelsOnSensorGrid }}true{{ else }}false{{ end }},
          toggle() {
              // Update URL and reload page
              const url = new URL(window.location);
              // Toggle 'filters' parameter presence
              if (url.searchParams.has('filters')) {
                  url.searchParams.delete('filters');
              } else {
                  url.searchParams.set('filters', '1');
              }
              window.location.href = url.toString();
          }
      }">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="flex flex-col sm:flex-row sm:items-end sm:justify-between mb-8">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">
                <span class="bg-gradient-to-r from-indigo-600 to-blue-500 bg-clip-text text-transparent">QiVitals</span>
            </h1>
            <p class="mt-1 text-sm text-slate-500">System health at a glance</p>
        </div>
        <div class="flex items-center gap-4 mt-4 sm:mt-0">
            <span class="text-xs text-slate-500 bg-white/80 backdrop-blur px-3 py-1.5 rounded-full shadow-sm">
                ⏱️ {{ .Now }}
            </span>
            <!-- Renamed to "Filters" with toggle behavior -->
            <button type="button"
                    @click="toggle()"
                    :class="filtersOpen ? 'bg-amber-600' : 'bg-indigo-600'"
                    class="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-xs font-medium text-white shadow-sm hover:opacity-90 transition-colors">
                <svg x-show="!filtersOpen" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293.707L3.293 7.293A1 1 0 013 6.586V4z" />
                </svg>
                <svg x-show="filtersOpen" x-cloak class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
                </svg>
                <span x-text="filtersOpen ? 'Close' : 'Filters'"></span>
            </button>
            <!-- Login / Logout -->
            {{ if .Authenticated }}
            <div class="inline-flex items-center gap-2 rounded-md border border-slate-200 bg-white/60 px-3 py-1.5 text-xs shadow-sm backdrop-blur">
                <svg class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="font-medium text-slate-700">{{ .Username }}</span>

                <span class="text-slate-300">|</span>

                <a href="/logout"
                   title="Logout"
                   class="text-slate-400 hover:text-red-600 transition-colors">
                    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </a>
            </div>
            {{ else }}
            <a href="/login"
               class="inline-flex items-center gap-1.5 rounded-md px-4 py-1.5 text-xs font-medium text-white bg-slate-800 hover:bg-slate-700 shadow-sm transition-colors">
                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Login
            </a>
            {{ end }}
        </div>
    </header>

    <!-- Filter form: hidden by default, toggled by button -->
    <div x-show="filtersOpen" x-cloak class="mb-6">
        {{template "filter-form" .Filter}}
    </div>

    <div id="sensor-grid-container"
         hx-get="{{ .FullURL }}"
         hx-trigger="every 2s"
         hx-swap="innerHTML">
        {{template "sensor-grid" .SensorGrid}}
    </div>
</div>
</body>
</html>
{{end}}
