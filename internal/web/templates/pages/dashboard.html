{{define "dashboard-page"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QiVitals · Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.target.id === 'sensor-grid-container') {
                if (!document.startViewTransition) return;
                evt.preventDefault();
                const target = evt.detail.target;
                document.startViewTransition(async () => {
                    const response = await fetch(target.getAttribute('hx-get'));
                    const newHTML = await response.text();
                    target.innerHTML = newHTML;
                    formatTimestamps();
                });
            }
        });
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'sensor-grid-container') formatTimestamps();
        });
        function formatTimestamps() {
            document.querySelectorAll('.format-timestamp').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'), 10);
                if (ts > 0) {
                    const date = new Date(ts * 1000);
                    el.textContent = date.toLocaleString(undefined, {
                        month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                }
            });
        }
    </script>
    <style>
        .tooltip-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .tooltip-trigger:hover .tooltip-content {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/50 min-h-screen font-sans antialiased text-slate-800">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="flex flex-col sm:flex-row sm:items-end sm:justify-between mb-8">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">
                <span class="bg-gradient-to-r from-indigo-600 to-blue-500 bg-clip-text text-transparent">QiVitals</span>
            </h1>
            <p class="mt-1 text-sm text-slate-500">System health at a glance</p>
        </div>
        <div class="flex items-center gap-4 mt-4 sm:mt-0">
            <span class="text-xs text-slate-500 bg-white/80 backdrop-blur px-3 py-1.5 rounded-full shadow-sm">
                ⏱️ {{ .Now }}
            </span>
            <a href="/manage"
               class="inline-flex items-center gap-1 rounded-md bg-indigo-600 px-3 py-1.5 text-xs font-medium text-white shadow-sm hover:bg-indigo-700 transition-colors">
                <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c..."/>
                </svg>
                Manage
            </a>
        </div>
    </header>

    {{template "filter-form" .Filter}}

    <div id="sensor-grid-container"
         hx-get="{{ .FullURL }}"
         hx-trigger="every 5s"
         hx-swap="innerHTML">
        {{template "sensor-grid" .SensorGrid}}
    </div>
</div>
</body>
</html>
{{end}}
