{{define "conditions-list"}}
<div class="space-y-2">
    {{range .}}
    <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
        <!-- Status pill -->
        <span class="mt-0.5 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold tracking-wide
            {{if eq .Status "True"}}bg-rose-100 text-rose-700
        {{else if eq .Status "False"}}bg-emerald-100 text-emerald-700
        {{else}}bg-slate-200 text-slate-600{{end}}">
        {{.Status}}
        </span>

        <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 flex-wrap">
                <span class="text-sm font-semibold text-slate-800">{{.Type}}</span>
                {{if .Reason}}
                <span class="text-xs font-mono text-slate-500">{{.Reason}}</span>
                {{end}}
            </div>
            {{if .Message}}
            <p class="text-xs text-slate-600 mt-1">{{.Message}}</p>
            {{end}}
        </div>
    </div>
    {{end}}
</div>
{{end}}
