{{define "sensor-grid"}}
{{if not .Groups}}
{{template "empty-state" .Empty}}
{{else}}
{{range .Groups}}
<div class="mb-12">
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
            <div class="h-2 w-2 rounded-full bg-indigo-500 shadow-sm shadow-indigo-300"></div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-indigo-700">{{.Namespace}}</h2>
        </div>
        <a href="/manage?namespace={{.Namespace}}"
           class="text-xs font-medium text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
            </svg>
            Manage
        </a>
    </div>
    <div class="rounded-xl border border-slate-200/80 bg-white/60 backdrop-blur p-5 shadow-sm">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
            {{range .Sensors}}
            {{template "sensor-card" .}}
            {{end}}
        </div>
    </div>
</div>
{{end}}
{{end}}
{{end}}
