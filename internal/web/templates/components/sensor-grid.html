{{define "sensor-grid"}}
{{if not .Groups}}
{{template "empty-state" .Empty}}
{{else}}
{{range .Groups}}
<div class="mb-6">
    <!-- Flex Container: Sidebar (Namespace) + Content (Grid) -->
    <div class="flex rounded-xl border border-slate-200/80 bg-white/60 backdrop-blur shadow-sm overflow-visible">

        <!-- Vertical Namespace Column -->
        <!-- w-12 fixes the width, flex centers the text vertically -->
        <div class="w-12 flex items-center justify-center bg-slate-50/50 border-r border-slate-200/80 py-4">
            <span class="transform -rotate-90 text-[10px] font-bold tracking-widest text-slate-400 whitespace-nowrap select-none">
                {{.Namespace}}
            </span>
        </div>

        <!-- Grid Area -->
        <!-- Reduced gap to 3 (12px) and padding to 5 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 p-5">
            {{range .Sensors}}
            {{template "sensor-card" .}}
            {{end}}
        </div>
    </div>
</div>
{{end}}
{{end}}
{{end}}
